# Demo manifest — parameterises every clip so cases can be added without touching code.
# Copy to manifest.yaml (gitignored) and fill in local paths.
dls:
  server_cmd: "python -m itksnap_dls --port 8911 --device cuda"
  base_url: "http://localhost:8911"
  # verified against GET /status before recording:
  api_version: "0.1.3"
  model: "TotalSegmentator"
  fast: true            # 3mm fast mode (recording box: 4090+ can do full-res)

cases:
  - id: case01
    main_image: data/case01/ct.nii.gz          # a body CT (HU); relative, resolved at run time
    task: "total"                               # Apache-licensed TS task (whitelist)
    expected_seg: data/case01/expected.nii.gz   # golden output for deterministic retakes
    route: uncertain                            # forces the human-handoff branch
  - id: case02
    main_image: data/case02/ct.nii.gz
    task: "total"
    route: confident                            # auto-accept branch
