# Demo manifest — parameterises every case so cases can be added without touching code.
# Copy to manifest.yaml (gitignored) and fill in local paths.

# Model server (propose step) — verified against GET /status before recording.
dls:
  server_cmd: "python -m itksnap_dls --port 8911 --device cuda"
  base_url: "http://localhost:8911"
  api_version: "0.1.3"
  model: "TotalSegmentator"
  fast: true            # 3mm fast mode (recording box: a 4090 can do full-res)

# Live ITK-SNAP command channel (apply + read_audit step).
snap:
  socket: "/tmp/snap-agent.sock"
  launch_cmd: "ITK-SNAP -g {main_image} --agent-listen /tmp/snap-agent.sock"   # {main_image} per case

cases:
  - id: case01
    main_image: data/case01/ct.nii.gz     # a 3-D body CT (HU); relative, resolved at run time
    apply_label: heart                     # proposed structure to apply (name or numeric id)
    itksnap_label: 1                       # ITK-SNAP label to paint it under
    route: uncertain                       # forces the human-handoff branch (expert corrects)
    expected_seg: data/case01/expected.nii.gz   # optional golden output for deterministic retakes
  - id: case02
    main_image: data/case02/ct.nii.gz
    apply_label: aorta
    itksnap_label: 2
    route: confident                       # auto-accept branch (no human correction)
