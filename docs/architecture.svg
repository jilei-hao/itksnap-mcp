<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 840" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="840" fill="#ffffff"/>
  <text x="540" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">ITK-SNAP Agentic API — Architecture</text>
  <text x="540" y="58" text-anchor="middle" font-size="13" fill="#64748b">the workspace is the base; the live GUI is a choice — “model proposes, human disposes”</text>

  <!-- ============ TIER 1: Agent / MCP ============ -->
  <rect x="40" y="74" width="1000" height="158" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
  <text x="60" y="98" font-size="15" font-weight="700" fill="#4338ca">Agent / Orchestration — itksnap-mcp  (Python, pip-installable, no ITK dependency)</text>

  <g font-size="11" fill="#1e293b">
    <!-- server.py -->
    <rect x="56" y="110" width="188" height="108" rx="8" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.3"/>
    <text x="150" y="129" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">server.py</text>
    <text x="150" y="146" text-anchor="middle" fill="#64748b">MCP tools</text>
    <text x="150" y="162" text-anchor="middle">create_workspace</text>
    <text x="150" y="177" text-anchor="middle">propose · apply · apply_file</text>
    <text x="150" y="192" text-anchor="middle">open_in_itksnap</text>
    <text x="150" y="207" text-anchor="middle">read_audit · set_actor</text>

    <!-- workspace.py -->
    <rect x="252" y="110" width="188" height="108" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/>
    <text x="346" y="129" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">workspace.py</text>
    <text x="346" y="146" text-anchor="middle" fill="#92400e">Workspace (headless)</text>
    <text x="346" y="162" text-anchor="middle">itksnap-wt + SimpleITK</text>
    <text x="346" y="177" text-anchor="middle">apply → seg + audit</text>
    <text x="346" y="192" text-anchor="middle">record from before/after</text>
    <text x="346" y="207" text-anchor="middle" fill="#64748b">sidecar audit log</text>

    <!-- dls_client.py -->
    <rect x="448" y="110" width="180" height="108" rx="8" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.3"/>
    <text x="538" y="129" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">dls_client.py</text>
    <text x="538" y="149" text-anchor="middle">DLSClient (HTTP)</text>
    <text x="538" y="167" text-anchor="middle">upload_image /</text>
    <text x="538" y="184" text-anchor="middle">run_automatic</text>
    <text x="538" y="205" text-anchor="middle" fill="#64748b">load_nifti_for_upload</text>

    <!-- channel.py -->
    <rect x="636" y="110" width="180" height="108" rx="8" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.3"/>
    <text x="726" y="129" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">channel.py</text>
    <text x="726" y="149" text-anchor="middle">SnapChannel</text>
    <text x="726" y="167" text-anchor="middle">Unix-socket client</text>
    <text x="726" y="184" text-anchor="middle">newline JSON-RPC</text>
    <text x="726" y="205" text-anchor="middle" fill="#64748b">live · optional</text>

    <!-- config.py -->
    <rect x="824" y="110" width="200" height="108" rx="8" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.3"/>
    <text x="924" y="129" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">config.py</text>
    <text x="924" y="149" text-anchor="middle">binaries + workspace dir</text>
    <text x="924" y="167" text-anchor="middle">resolved from env</text>
    <text x="924" y="187" text-anchor="middle" fill="#64748b">ITKSNAP_WT_BIN</text>
    <text x="924" y="204" text-anchor="middle" fill="#64748b">ITKSNAP_BIN · DLS_URL</text>
  </g>

  <!-- ============ connectors down (three seams) ============ -->
  <!-- headless apply -> workspace -->
  <path d="M346,218 L420,300" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrowA)"/>
  <rect x="432" y="234" width="252" height="24" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="558" y="250" text-anchor="middle" font-size="11.5" fill="#92400e">headless apply · itksnap-wt + SimpleITK</text>

  <!-- HTTP propose -> dls -->
  <path d="M538,218 C538,255 300,255 200,300" stroke="#475569" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <rect x="70" y="250" width="170" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="155" y="266" text-anchor="middle" font-size="11.5" fill="#334155">HTTP · propose</text>

  <!-- launch + socket -> ITK-SNAP -->
  <path d="M726,218 C726,255 860,255 890,300" stroke="#059669" stroke-width="1.8" fill="none" marker-end="url(#arrowG)"/>
  <rect x="770" y="250" width="250" height="24" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="895" y="266" text-anchor="middle" font-size="11.5" fill="#047857">launch -w + --agent-listen (optional)</text>

  <!-- ============ TIER 2a: DLS server ============ -->
  <rect x="40" y="300" width="300" height="150" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.6"/>
  <text x="60" y="324" font-size="15" font-weight="700" fill="#0e7490">Model Server — itksnap-dls</text>
  <text x="60" y="343" font-size="12" fill="#155e75">FastAPI service · :8911</text>
  <g font-size="11.5" fill="#164e63">
    <text x="60" y="368">• TotalSegmentator (fast / full)</text>
    <text x="60" y="388">• /v2/start_session · upload_raw</text>
    <text x="60" y="408">• /v2/run_automatic</text>
    <text x="60" y="432" fill="#0891b2">→ multi-label volume + {id: name}</text>
  </g>

  <!-- ============ TIER 2b: THE WORKSPACE (base) ============ -->
  <rect x="372" y="300" width="316" height="196" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.2"/>
  <text x="530" y="324" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">Workspace — the base (source of truth)</text>
  <text x="530" y="343" text-anchor="middle" font-size="11.5" fill="#92400e">created &amp; applied-into headlessly · no running GUI</text>
  <g font-size="11.5" fill="#334155">
    <rect x="388" y="356" width="284" height="30" rx="6" fill="#ffffff" stroke="#fcd34d"/>
    <text x="530" y="375" text-anchor="middle" font-weight="600">case.itksnap  ·  main image + seg layer</text>
    <rect x="388" y="392" width="284" height="30" rx="6" fill="#ffffff" stroke="#fcd34d"/>
    <text x="530" y="411" text-anchor="middle">case.seg.nii.gz  ·  segmentation, edited in place</text>
    <rect x="388" y="428" width="284" height="30" rx="6" fill="#ffffff" stroke="#fcd34d"/>
    <text x="530" y="447" text-anchor="middle">case.itksnap.mcp.json  ·  audit log + actor</text>
  </g>
  <text x="530" y="478" text-anchor="middle" font-size="11" fill="#b45309" font-weight="600">apply merges the proposal + computes the audit record here</text>

  <!-- ============ TIER 2c: ITK-SNAP GUI (optional) ============ -->
  <rect x="720" y="300" width="320" height="330" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="740" y="323" font-size="14.5" font-weight="700" fill="#047857">ITK-SNAP GUI — optional live view</text>
  <text x="740" y="341" font-size="11" fill="#065f46">launched by open_in_itksnap()  ·  -w workspace --agent-listen</text>

  <rect x="738" y="352" width="284" height="46" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.3"/>
  <text x="880" y="371" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">main.cxx — QLocalServer (GUI thread)</text>
  <text x="880" y="389" text-anchor="middle" font-size="10.5" fill="#334155">set_actor · apply_seg_file · get_audit</text>

  <path d="M880,398 L880,414" stroke="#059669" stroke-width="1.6" marker-end="url(#arrowG)"/>

  <rect x="738" y="414" width="284" height="42" rx="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.3"/>
  <text x="880" y="431" text-anchor="middle" font-size="11.5" font-weight="700" fill="#047857">human paints → commit the delta</text>
  <text x="880" y="448" text-anchor="middle" font-size="10.5" fill="#334155">StoreUndoPoint() — the commit chokepoint</text>

  <path d="M880,456 L880,472" stroke="#059669" stroke-width="1.6" marker-end="url(#arrowG)"/>

  <rect x="738" y="472" width="284" height="52" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.4"/>
  <text x="880" y="490" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f766e">SegmentationAuditRecord::BuildFromDeltas()</text>
  <text x="880" y="507" text-anchor="middle" font-size="10.5" fill="#334155">old = new − delta  ·  record{actor: human}</text>
  <text x="880" y="519" text-anchor="middle" font-size="10" fill="#64748b">the live human-correction beat</text>

  <text x="880" y="555" text-anchor="middle" font-size="11" fill="#065f46">loads the workspace ↑ · the human saves back ↓</text>
  <!-- workspace <-> GUI link -->
  <path d="M688,400 L720,400" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrowG)" marker-start="url(#arrowG)"/>
  <text x="704" y="392" text-anchor="middle" font-size="10" fill="#047857">-w</text>

  <!-- ============ audit record: two producers, one schema ============ -->
  <path d="M470,496 L470,690" stroke="#b45309" stroke-width="1.8" fill="none" marker-end="url(#arrowA)"/>
  <text x="360" y="560" font-size="10.5" fill="#92400e">headless producer:</text>
  <text x="360" y="575" font-size="10.5" fill="#92400e">before/after → record</text>

  <path d="M820,630 C820,680 700,680 660,690" stroke="#059669" stroke-width="1.8" fill="none" marker-end="url(#arrowG)"/>
  <text x="770" y="668" font-size="10.5" fill="#047857">live producer: BuildFromDeltas</text>

  <rect x="360" y="690" width="410" height="58" rx="10" fill="#0f766e"/>
  <text x="565" y="712" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">audit record → JSON  ·  same schema, two producers</text>
  <text x="565" y="732" text-anchor="middle" font-size="10.5" fill="#a7f3d0" font-family="monospace">{op, timestamp, actor, changed_voxels, bbox, before/after}</text>

  <!-- geometry note -->
  <text x="60" y="775" font-size="11" fill="#64748b">Note: the agent restores the CT’s geometry onto the proposal (CopyInformation) so it aligns with the workspace image grid before apply.</text>
</svg>
