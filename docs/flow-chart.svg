<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 860" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="fr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#0e7490"/>
    </marker>
    <marker id="fw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="860" fill="#ffffff"/>
  <text x="590" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">ITK-SNAP Agentic API — End-to-End Flow</text>
  <text x="590" y="56" text-anchor="middle" font-size="13" fill="#64748b">workspace-first: create → propose → apply (headless) → then, optionally, the human corrects in a live GUI</text>

  <!-- ===== lane headers ===== -->
  <g>
    <rect x="50" y="70" width="180" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="140" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">Agent (itksnap-mcp)</text>

    <rect x="290" y="70" width="190" height="40" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="385" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0e7490">Model server (itksnap-dls)</text>

    <rect x="530" y="70" width="190" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
    <text x="625" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">Workspace (base)</text>

    <rect x="765" y="70" width="200" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="865" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">ITK-SNAP GUI (optional)</text>

    <rect x="1000" y="70" width="150" height="40" rx="8" fill="#fef2f2" stroke="#f43f5e" stroke-width="1.5"/>
    <text x="1075" y="95" text-anchor="middle" font-size="12.5" font-weight="700" fill="#be123c">Human expert</text>
  </g>

  <!-- ===== lifelines ===== -->
  <g stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="4 5">
    <line x1="140" y1="110" x2="140" y2="835"/>
    <line x1="385" y1="110" x2="385" y2="835"/>
    <line x1="625" y1="110" x2="625" y2="835"/>
    <line x1="865" y1="110" x2="865" y2="835"/>
    <line x1="1075" y1="110" x2="1075" y2="835"/>
  </g>

  <!-- activation bars -->
  <rect x="379" y="188" width="12" height="40" fill="#a5f3fc" opacity="0.7"/>
  <rect x="619" y="150" width="12" height="34" fill="#fde68a" opacity="0.9"/>
  <rect x="619" y="330" width="12" height="52" fill="#fde68a" opacity="0.9"/>
  <rect x="859" y="452" width="12" height="212" fill="#a7f3d0" opacity="0.8"/>

  <!-- ===== phase 1: no GUI needed ===== -->
  <g font-size="11.5" fill="#334155">
    <!-- 0 create_workspace -->
    <line x1="140" y1="152" x2="619" y2="152" stroke="#b45309" stroke-width="1.7" marker-end="url(#fw)"/>
    <text x="380" y="145" text-anchor="middle" font-weight="600" fill="#92400e">0 · create_workspace(ct): itksnap-wt (main image + empty seg)</text>

    <!-- 1 propose -->
    <line x1="140" y1="190" x2="379" y2="190" stroke="#334155" stroke-width="1.6" marker-end="url(#fa)"/>
    <text x="258" y="183" text-anchor="middle" font-weight="600">1 · propose(ct): upload + run_automatic</text>

    <!-- 2 return labels -->
    <line x1="391" y1="226" x2="140" y2="226" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#fr)"/>
    <text x="262" y="219" text-anchor="middle" fill="#0e7490">2 · label volume + {id:name}  (48 structures)</text>

    <!-- 3 gate note -->
    <rect x="34" y="244" width="212" height="28" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-dasharray="4 4"/>
    <text x="140" y="262" text-anchor="middle" fill="#92400e">3 · gate: auto-accept | route-to-human (planned)</text>

    <!-- 4 write mask note -->
    <rect x="34" y="280" width="212" height="28" rx="6" fill="#eef2ff" stroke="#818cf8"/>
    <text x="140" y="298" text-anchor="middle" fill="#3730a3">4 · write_label_mask: restore CT geometry</text>

    <!-- 5 apply headless -->
    <line x1="140" y1="336" x2="619" y2="336" stroke="#b45309" stroke-width="1.7" marker-end="url(#fw)"/>
    <text x="380" y="329" text-anchor="middle" font-weight="600" fill="#92400e">5 · apply(label): merge into workspace seg (headless) · actor = agent</text>
  </g>

  <!-- 5b workspace processing box -->
  <rect x="512" y="346" width="226" height="30" rx="7" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="625" y="365" text-anchor="middle" font-size="11" fill="#92400e">before/after → audit record + log</text>

  <g font-size="11.5" fill="#334155">
    <!-- 6 audit return -->
    <line x1="619" y1="394" x2="140" y2="394" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#fr)"/>
    <text x="380" y="387" text-anchor="middle" fill="#0e7490">6 · audit record {changed_voxels: 1169665, bbox, before/after}</text>
  </g>

  <!-- banner: phase 1 needs no GUI -->
  <rect x="300" y="408" width="560" height="26" rx="13" fill="#eef2ff" stroke="#6366f1" stroke-dasharray="3 4"/>
  <text x="580" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">steps 0–6 need no running ITK-SNAP — the workspace is complete on disk</text>

  <!-- divider: human disposes -->
  <line x1="30" y1="444" x2="1160" y2="444" stroke="#f43f5e" stroke-width="1.2" stroke-dasharray="2 6"/>
  <rect x="420" y="432" width="340" height="24" rx="12" fill="#fef2f2" stroke="#f43f5e"/>
  <text x="590" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#be123c">— human disposes (optional): open a live GUI and correct —</text>

  <!-- ===== phase 2: optional live GUI ===== -->
  <g font-size="11.5" fill="#334155">
    <!-- 7 open_in_itksnap -->
    <line x1="140" y1="478" x2="859" y2="478" stroke="#059669" stroke-width="1.6" marker-end="url(#fa)"/>
    <text x="500" y="471" text-anchor="middle" font-weight="600" fill="#047857">7 · open_in_itksnap(): launch  -w workspace  --agent-listen</text>

    <!-- 8 GUI loads workspace -->
    <line x1="859" y1="514" x2="631" y2="514" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#fw)"/>
    <text x="745" y="507" text-anchor="middle" fill="#92400e">8 · load workspace (-w)</text>

    <!-- 9 human paints -->
    <line x1="1075" y1="556" x2="871" y2="556" stroke="#334155" stroke-width="1.6" marker-end="url(#fa)"/>
    <text x="972" y="549" text-anchor="middle" font-weight="600">9 · paintbrush correction</text>
  </g>

  <!-- 10 ITK human commit box -->
  <rect x="740" y="574" width="256" height="56" rx="9" fill="#fff1f2" stroke="#fb7185" stroke-width="1.4"/>
  <text x="868" y="594" text-anchor="middle" font-size="11.5" font-weight="700" fill="#be123c">10 · commit → record{actor: human}</text>
  <text x="868" y="613" text-anchor="middle" font-size="10.5" fill="#334155">BuildFromDeltas · tag auto-resets to human</text>

  <g font-size="11.5" fill="#334155">
    <!-- 11 read_audit -->
    <line x1="140" y1="654" x2="859" y2="654" stroke="#334155" stroke-width="1.6" marker-end="url(#fa)"/>
    <text x="500" y="647" text-anchor="middle" font-weight="600">11 · read_audit()  (live socket)</text>

    <!-- 12 human diff return -->
    <line x1="859" y1="690" x2="140" y2="690" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#fr)"/>
    <text x="500" y="683" text-anchor="middle" fill="#0e7490">12 · human-tagged correction diff</text>
  </g>

  <!-- note: persist -->
  <rect x="740" y="704" width="256" height="26" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-dasharray="4 4"/>
  <text x="868" y="721" text-anchor="middle" font-size="10.5" fill="#92400e">the human saves → workspace updated on disk</text>

  <!-- legend -->
  <g font-size="11" fill="#475569">
    <line x1="60" y1="795" x2="95" y2="795" stroke="#334155" stroke-width="1.6" marker-end="url(#fa)"/>
    <text x="102" y="799">call</text>
    <line x1="160" y1="795" x2="195" y2="795" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#fr)"/>
    <text x="202" y="799">return</text>
    <line x1="270" y1="795" x2="305" y2="795" stroke="#b45309" stroke-width="1.6" marker-end="url(#fw)"/>
    <text x="312" y="799">workspace (headless)</text>
    <rect x="452" y="789" width="14" height="12" fill="#a7f3d0" opacity="0.8"/>
    <text x="472" y="799">active (processing)</text>
  </g>
</svg>
